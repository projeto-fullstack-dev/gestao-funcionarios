spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/gestao_funcionarios?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${DB_USERNAME:gestao}
spring.datasource.password=${DB_PASSWORD:gestao}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=true

logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level logger=%logger{36} message="%message" %kvp%n%ex

security.jwt.secret=${JWT_SECRET:devdixi}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
