name: gestao-funcionarios

services:
  mysql:
    image: mysql:8.4
    command: --log-bin-trust-function-creators=1
    container_name: gestao-funcionarios-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gestao_funcionarios}
      MYSQL_USER: ${MYSQL_USER:-gestao}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gestao}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: America/Sao_Paulo
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: gestao-funcionarios-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-gestao_funcionarios}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
      DB_USERNAME: ${MYSQL_USER:-gestao}
      DB_PASSWORD: ${MYSQL_PASSWORD:-gestao}
      JWT_SECRET: ${JWT_SECRET:-devdixi}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    container_name: gestao-funcionarios-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql_data:
